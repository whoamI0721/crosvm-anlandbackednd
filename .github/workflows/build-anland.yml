name: Build crosvm with anland backend

on:
  push:
    branches: [droidvm]
  workflow_dispatch:

env:
  NDK_VER: r29
  API: 30

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-linux-android

      - name: Install NDK
        run: |
          ZIP="android-ndk-${NDK_VER}-linux.zip"
          wget -q "https://dl.google.com/android/repository/${ZIP}"
          unzip -q "$ZIP" -d /tmp
          NDK="/tmp/android-ndk-${NDK_VER}"
          echo "NDK=$NDK" >> $GITHUB_ENV
          echo "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwayland-dev wayland-protocols pkg-config

      - name: Configure cargo linker
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-linux-android]
          linker = "aarch64-linux-android30-clang"
          EOF

      - name: Create minijail stubs
        run: |
          mkdir -p third_party/minijail/rust/minijail/src
          cat > third_party/minijail/rust/minijail/Cargo.toml << 'EOF'
          [package]
          name = "minijail"
          version = "0.1.0"
          edition = "2021"
          EOF
          cat > third_party/minijail/rust/minijail/src/lib.rs << 'EOF'
          use std::io;
          use std::os::fd::RawFd;
          use std::path::Path;
          pub fn kill(pid: i32, sig: i32) -> io::Result<()> { Ok(()) }
          pub fn try_clone() -> io::Result<Self> { Err(io::Error::new(io::ErrorKind::Other, "stub")) }
          pub struct Command;
          impl Command {
              pub fn new<T: AsRef<std::ffi::OsStr>>(_p: T) -> Self { Command }
              pub fn run_command(&self, _fd: RawFd) -> io::Result<()> { Ok(()) }
          }
          pub fn mount(_s: &str, _d: &str, _f: &str, _fl: u64, _da: &str) -> io::Result<()> { Ok(()) }
          pub fn mount_with_data(_s: &str, _d: &str, _f: &str, _fl: u64, _da: &str) -> io::Result<()> { Ok(()) }
          pub fn mount_bind(_s: &str, _d: &str, _w: bool) -> io::Result<()> { Ok(()) }
          pub fn log_seccomp_filter_failures() {}
          pub fn enter_pivot_root(_p: &Path) -> io::Result<()> { Ok(()) }
          pub fn fork(&self) -> io::Result<()> { Ok(()) }
          EOF

      - name: Build C bridge
        run: |
          CC="aarch64-linux-android${API}-clang"
          SYS="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          $CC -target aarch64-linux-android${API} \
            -I"$SYS/usr/include" \
            -c gpu_display/src/anland_display_bridge.c \
            -o /tmp/anland_bridge.o
          llvm-ar rcs /tmp/libanland_bridge.a /tmp/anland_bridge.o

      - name: Build crosvm
        env:
          RUSTFLAGS: -L native=/tmp -l static=anland_bridge -l nativewindow -l nativehardwarebuffer
        run: |
          cargo build \
            --target aarch64-linux-android \
            --features anland \
            --release

      - uses: actions/upload-artifact@v4
        with:
          name: crosvm-anland
          path: target/aarch64-linux-android/release/crosvm